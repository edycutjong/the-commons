<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>The Commons</title>
    <style>
      :root {
        --bg: #080611;
        --card: rgba(28, 20, 48, 0.72);
        --stroke: rgba(139, 92, 246, 0.28);
        --violet: #8b5cf6;
        --green: #10b981;
        --ink: #ece8ff;
        --muted: #9b93c4;
        --danger: #f0567a;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; background: var(--bg); color: var(--ink); }
      body {
        font-family: ui-monospace, "JetBrains Mono", SFMono-Regular, Menlo, monospace;
        -webkit-font-smoothing: antialiased;
        padding: 14px;
        max-width: 560px;
        margin: 0 auto;
        background:
          radial-gradient(1200px 400px at 50% -10%, rgba(139, 92, 246, 0.18), transparent),
          var(--bg);
      }
      #app { display: flex; flex-direction: column; gap: 14px; }
      .card {
        background: var(--card);
        border: 1px solid var(--stroke);
        border-radius: 18px;
        padding: 18px;
        backdrop-filter: blur(14px);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
      }
      h1 { font-size: 21px; letter-spacing: 0.06em; margin: 6px 0 8px; }
      h2 { font-size: 15px; letter-spacing: 0.08em; margin: 4px 0 10px; color: var(--muted); }
      .flavor { color: var(--ink); line-height: 1.5; margin: 6px 0; }
      .payoff { color: var(--muted); font-size: 13px; line-height: 1.5; margin: 8px 0 12px; }
      .byline { color: var(--muted); font-size: 12px; }
      .ticker {
        font-size: 13px; color: var(--violet);
        border-top: 1px dashed var(--stroke); border-bottom: 1px dashed var(--stroke);
        padding: 8px 0; margin: 10px 0; text-align: center; letter-spacing: 0.04em;
      }
      .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0; }
      .choice {
        font: inherit; color: var(--ink); background: rgba(139, 92, 246, 0.10);
        border: 1px solid var(--stroke); border-radius: 12px; padding: 16px 10px;
        letter-spacing: 0.06em; cursor: pointer; transition: transform 0.08s, background 0.15s;
      }
      .choice:active { transform: scale(0.98); }
      .choice.sel { background: rgba(139, 92, 246, 0.34); border-color: var(--violet); }
      .stake { display: flex; flex-direction: column; gap: 6px; font-size: 13px; color: var(--muted); margin: 8px 0; }
      .stake output { color: var(--ink); font-weight: 700; }
      input[type="range"] { accent-color: var(--violet); }
      .ins { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); margin: 4px 0 12px; }
      .ins.held { color: var(--green); }
      .seal {
        width: 100%; font: inherit; letter-spacing: 0.10em; color: #0a0713; font-weight: 800;
        background: linear-gradient(180deg, #a688ff, var(--violet)); border: none;
        border-radius: 14px; padding: 15px; cursor: pointer;
      }
      .seal:disabled { opacity: 0.5; cursor: default; }
      .err { color: var(--danger); font-size: 12px; min-height: 14px; margin-top: 8px; text-align: center; }
      .badge {
        display: inline-block; font-size: 10px; letter-spacing: 0.14em; padding: 3px 9px;
        border-radius: 999px; border: 1px solid var(--stroke); color: var(--muted); margin-bottom: 4px;
      }
      .badge.ok { color: var(--green); border-color: rgba(16, 185, 129, 0.5); }
      .badge.pre { color: #f0b45c; border-color: rgba(240, 180, 92, 0.5); }
      .countdown { text-align: center; font-size: 20px; letter-spacing: 0.12em; margin: 14px 0; color: var(--violet); }
      .streak { text-align: center; color: var(--muted); font-size: 13px; }
      .reckoning .verdict { font-size: 17px; margin: 6px 0; }
      .reckoning .detail { color: var(--muted); font-size: 12px; margin-bottom: 12px; }
      .reckoning.ruin .verdict { color: var(--danger); }
      .reckoning.triumph .verdict { color: var(--green); }
      .bars { display: flex; flex-direction: column; gap: 7px; }
      .bar { display: grid; grid-template-columns: 64px 1fr 46px; align-items: center; gap: 8px; font-size: 12px; }
      .bar .bt { height: 12px; background: var(--violet); border-radius: 6px; min-width: 2px; }
      .bar .bn { text-align: right; color: var(--muted); }
      .ceremony { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0 4px; }
      .chip { font-size: 12px; padding: 5px 10px; border-radius: 999px; border: 1px solid var(--stroke); }
      .chip.saint { color: var(--violet); }
      .chip.serpent { color: var(--green); }
      .mine { margin-top: 12px; padding: 10px; border-radius: 10px; font-size: 13px; background: rgba(255,255,255,0.04); }
      .mine.win { color: var(--green); }
      .mine.loss { color: var(--danger); }
      .foot { text-align: center; color: var(--muted); font-size: 12px; padding: 4px 0 10px; }
      .loading { text-align: center; color: var(--muted); padding: 40px 0; }
      .error { color: var(--danger); text-align: center; }
      .hint { color: var(--muted); font-size: 12px; text-align: center; margin: 12px 0 2px; line-height: 1.5; }
      /* section dividers between the reveal, tonight's dilemma, and the feed */
      .divider {
        display: flex; align-items: center; gap: 10px;
        color: var(--muted); font-size: 10px; letter-spacing: 0.24em; text-align: center;
        margin: 2px 0;
      }
      .divider::before, .divider::after {
        content: ""; flex: 1; height: 1px; background: var(--stroke);
      }
      /* ── RECKONING reveal choreography (the "oh"): the featured catastrophe ── */
      .reckoning.featured { border-color: rgba(240, 86, 122, 0.4); position: relative; overflow: hidden; }
      .reckoning.featured.triumph { border-color: rgba(16, 185, 129, 0.4); }
      .reckoning .hero-label { font-size: 10px; letter-spacing: 0.16em; color: var(--muted); margin-bottom: 6px; }
      .reckoning.featured .verdict { font-size: 20px; animation: punch 0.55s ease-out both; }
      .reckoning.featured .bar .bt {
        transform: scaleX(0); transform-origin: left center;
        animation: sweep 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) both;
      }
      .reckoning.featured::after {
        content: ""; position: absolute; inset: 0; border-radius: 18px; pointer-events: none;
        background: radial-gradient(circle at 50% 25%, rgba(240, 86, 122, 0.28), transparent 68%);
        animation: flash 0.95s ease-out both;
      }
      .reckoning.featured.triumph::after {
        background: radial-gradient(circle at 50% 25%, rgba(16, 185, 129, 0.24), transparent 68%);
      }
      @keyframes punch {
        0% { opacity: 0; transform: scale(0.82); }
        60% { transform: scale(1.04); }
        100% { opacity: 1; transform: scale(1); }
      }
      @keyframes sweep { to { transform: scaleX(1); } }
      @keyframes flash { 0% { opacity: 0; } 22% { opacity: 1; } 100% { opacity: 0; } }
      @media (prefers-reduced-motion: reduce) {
        .choice { transition: none; }
        .reckoning.featured .verdict,
        .reckoning.featured .bar .bt,
        .reckoning.featured::after { animation: none; }
        .reckoning.featured .bar .bt { transform: none; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./game.ts"></script>
  </body>
</html>
