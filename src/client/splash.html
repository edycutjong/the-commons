<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>The Commons</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: ui-monospace, "JetBrains Mono", SFMono-Regular, Menlo, monospace;
        color: #ece8ff;
        background:
          radial-gradient(900px 340px at 50% -10%, rgba(139, 92, 246, 0.28), transparent),
          #080611;
        display: flex; align-items: center; justify-content: center;
        min-height: 100vh; padding: 24px; text-align: center;
      }
      .wrap { max-width: 460px; }
      .seal {
        width: 68px; height: 68px; margin: 0 auto 18px; border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, #a688ff, #7c3aed);
        box-shadow: 0 8px 30px rgba(124, 58, 237, 0.5); display: grid; place-items: center;
        font-size: 30px;
      }
      h1 { font-size: 26px; letter-spacing: 0.10em; margin: 0 0 10px; }
      p { color: #9b93c4; line-height: 1.55; margin: 0 0 18px; }
      .cta {
        display: inline-block; letter-spacing: 0.10em; color: #0a0713; font-weight: 800;
        background: linear-gradient(180deg, #a688ff, #8b5cf6); border-radius: 999px;
        padding: 12px 22px; font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="seal">🕯️</div>
      <h1>THE COMMONS</h1>
      <p>A nightly dilemma. Seal one choice — feed the pot or hoard it — before midnight. At the Reckoning, the crowd learns what it did to itself.</p>
      <span class="cta">Tap to enter the ritual</span>
    </div>
  </body>
</html>
